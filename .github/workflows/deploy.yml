name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: bangsmackpow/marketflow

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Trigger Portainer Redeploy
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Check webhook URL
        id: check
        env:
          WEBHOOK: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "webhook=skip" >> $GITHUB_OUTPUT
          else
            echo "webhook=ready" >> $GITHUB_OUTPUT
          fi

      - name: Notify Portainer via webhook
        if: steps.check.outputs.webhook == 'ready'
        env:
          WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        run: |
          curl -sS -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            --max-time 30 \
            --fail-with-body || echo "Webhook failed, continuing..."
        shell: bash
