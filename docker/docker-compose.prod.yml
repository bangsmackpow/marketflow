version: "3.8"

services:
  app:
    image: ghcr.io/bangsmackpow/marketflow:latest
    container_name: marketflow
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: info
      DATABASE_URL: ${DATABASE_URL:-/app/data/marketflow.db}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?error}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-https://marketflow.builtnetworks.com}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GA4_CLIENT_ID: ${GA4_CLIENT_ID:-}
      GA4_CLIENT_SECRET: ${GA4_CLIENT_SECRET:-}
      GA4_PROPERTY_ID: ${GA4_PROPERTY_ID:-}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_NAME: ${ADMIN_NAME:-Admin}
      ADMIN_COMPANY: ${ADMIN_COMPANY:-Built Networks}
      ADMIN_SLUG: ${ADMIN_SLUG:-built-networks}
      BACKUP_DIR: /app/data/backups
    volumes:
      - marketflow-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  marketflow-data:
