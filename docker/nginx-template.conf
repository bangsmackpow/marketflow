# MarketFlow Nginx Proxy Manager Configuration
# Paste this into the "Advanced" tab of your NPM Proxy Host.
#
# Domain: marketflow.builtnetworks.com
# Forward: http://<docker-host-ip>:3000

server {
    listen 80;
    server_name marketflow.builtnetworks.com;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;

        # WebSocket support (for future streaming)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Header forwarding
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # Company context header (sent by frontend SDK)
        proxy_set_header X-Company-Id $http_x_company_id;

        # Timeouts
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
        proxy_connect_timeout 10s;

        # Buffering
        proxy_buffer_size 4k;
        proxy_buffers 4 32k;
        proxy_busy_buffers_size 64k;
        proxy_temp_file_write_size 64k;
    }

    # API-specific CORS preflight
    location /api/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "https://marketflow.builtnetworks.com";
            add_header Access-Control-Allow-Methods "GET, POST, PATCH, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Company-Id";
            add_header Access-Control-Max-Age 86400;
            return 204;
        }
        proxy_pass http://localhost:3000;
    }

    # Health check passthrough (no auth required)
    location /api/v1/health {
        proxy_pass http://localhost:3000;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "no-store";
    }

    client_max_body_size 10m;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_proxied any;
    gzip_min_length 256;
}
